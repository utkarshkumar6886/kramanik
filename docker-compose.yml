# ============================================================
# KRAMANIK — Local Development Stack
# Run everything with: docker compose up
# ============================================================

version: '3.9'

services:

  # ── MySQL Database ─────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: kramanik-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE:      kramanik_db
      MYSQL_USER:          ${DB_USER:-kramanik}
      MYSQL_PASSWORD:      ${DB_PASSWORD:-kramanik123}
    ports:
      - "3306:3306"
    volumes:
      - kramanik-db-data:/var/lib/mysql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot Backend ────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kramanik-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL:      jdbc:mysql://db:3306/kramanik_db?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-kramanik}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-kramanik123}
      KRAMANIK_JWT_SECRET:        ${JWT_SECRET:-KramanikSuperSecretKey2024ChangeInProduction}
      KRAMANIK_JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      KRAMANIK_CORS_ALLOWED_ORIGINS: ${CORS_ORIGINS:-http://localhost:5500,http://127.0.0.1:5500}
      SPRING_PROFILES_ACTIVE:     ${SPRING_PROFILE:-prod}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Frontend (Nginx static server) ────────────────────────
  frontend:
    image: nginx:alpine
    container_name: kramanik-frontend
    restart: unless-stopped
    depends_on:
      - backend
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"

volumes:
  kramanik-db-data:
