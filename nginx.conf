# ============================================================
# KRAMANIK — Nginx Config
# Serves static frontend + proxies /api/* to backend
# ============================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 1024;

    # Cache static assets
    location ~* \.(css|js|png|jpg|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Proxy API calls to Spring Boot backend
    location /api/ {
        proxy_pass         http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;

        # CORS handled by Spring — don't double-add headers here
    }

    # SPA fallback — serve index.html for all HTML pages
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }
}
