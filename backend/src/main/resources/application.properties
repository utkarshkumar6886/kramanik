# ============================================================
# KRAMANIK — Application Configuration
# All sensitive values MUST be set as environment variables.
# Copy .env.example to .env and fill in values for local dev.
# ============================================================

# Server
server.port=8080
spring.application.name=kramanik-backend

# ── DATABASE ─────────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/kramanik_db?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:1234}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ── JWT ───────────────────────────────────────────────────────
kramanik.jwt.secret=${KRAMANIK_JWT_SECRET}
kramanik.jwt.expiration-ms=${KRAMANIK_JWT_EXPIRATION_MS:86400000}

# ── CORS ─────────────────────────────────────────────────────
kramanik.cors.allowed-origins=${KRAMANIK_CORS_ALLOWED_ORIGINS:http://localhost:5500,http://127.0.0.1:5500}

# ── ACTUATOR ─────────────────────────────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ── RAZORPAY ─────────────────────────────────────────────────
razorpay.key.id=${RAZORPAY_KEY_ID:}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:}
razorpay.webhook.secret=${RAZORPAY_WEBHOOK_SECRET:}

# ── WHATSAPP / WATI ──────────────────────────────────────────
wati.api.url=${WATI_API_URL:https://live-mt-server.wati.io/api/v1}
wati.api.token=${WATI_API_TOKEN:}
wati.enabled=${WATI_ENABLED:false}

# ── LOGGING ──────────────────────────────────────────────────
logging.level.in.kramanik=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
