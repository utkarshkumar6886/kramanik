<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kramanik — Attendance</title>
  <link rel="stylesheet" href="css/main.css" />
  <style>
    .att-toolbar { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:18px 20px; display:flex; align-items:center; gap:16px; flex-wrap:wrap; margin-bottom:20px; }
    .att-toolbar label { font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:0.6px; }
    .att-toolbar select, .att-toolbar input[type="date"] { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm); color:var(--text); font-family:var(--font-body); font-size:14px; padding:8px 12px; outline:none; }
    .att-toolbar select:focus, .att-toolbar input:focus { border-color:var(--accent); }
    .att-toolbar select option { background:var(--surface); }
    .att-summary { display:flex; gap:12px; align-items:center; margin-left:auto; }
    .att-pill { display:flex; align-items:center; gap:6px; background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:5px 12px; font-size:12px; font-weight:500; }
    .att-dot { width:8px; height:8px; border-radius:50%; }
    .quick-btns { display:flex; gap:8px; flex-wrap:wrap; }
    .att-pct-bar { display:flex; align-items:center; gap:8px; }
    .att-pct-bar .bar { flex:1; height:6px; background:var(--border); border-radius:3px; overflow:hidden; }
    .att-pct-bar .bar-fill { height:100%; border-radius:3px; }
  </style>
</head>
<body>
  <div class="layout" id="layout"></div>
  <div id="toast-container" class="toast-container"></div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/pages/attendance.js"></script>
  <script>initAttendance();</script>
</body>
</html>
