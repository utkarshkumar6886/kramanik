<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kramanik — Login</title>
  <link rel="stylesheet" href="css/main.css" />
  <style>
    body { min-height:100vh; display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; }
    body::before { content:''; position:absolute; width:600px; height:600px; background:radial-gradient(circle, rgba(245,166,35,0.12) 0%, transparent 70%); top:-150px; right:-150px; pointer-events:none; }
    body::after  { content:''; position:absolute; width:400px; height:400px; background:radial-gradient(circle, rgba(232,98,58,0.08) 0%, transparent 70%); bottom:-100px; left:-100px; pointer-events:none; }
    .login-box { width:400px; background:var(--card); border:1px solid var(--border); border-radius:20px; padding:48px 40px; position:relative; z-index:1; animation:slideUp 0.5s ease both; }
    @keyframes slideUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }
    .login-logo { font-family:var(--font-head); font-size:28px; font-weight:800; letter-spacing:-0.5px; margin-bottom:4px; }
    .login-logo span { color:var(--accent); }
    .login-sub { color:var(--muted); font-size:13px; margin-bottom:36px; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-logo">Krama<span>nik</span></div>
    <div class="login-sub">Coaching Institute Management</div>
    <div class="error-msg" id="login-error"></div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="admin@kramanik.in" value="admin@kramanik.in" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="••••••••" value="Admin@123"
             onkeydown="if(event.key==='Enter') doLogin()" />
    </div>
    <button class="btn btn-primary btn-block" onclick="doLogin()">Sign In →</button>
    <p style="text-align:center;margin-top:16px;font-size:13px;color:var(--muted)">New institute? <a href="register.html" style="color:var(--accent)">Create free account →</a></p>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/pages/login.js"></script>
</body>
</html>
