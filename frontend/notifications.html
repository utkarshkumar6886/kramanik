<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kramanik — Notifications</title>
  <link rel="stylesheet" href="css/main.css" />
  <style>
    .template-selector { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:24px; }
    .template-card { background:var(--card); border:2px solid var(--border); border-radius:var(--radius); padding:18px; cursor:pointer; transition:all var(--transition); }
    .template-card:hover { border-color:var(--accent); }
    .template-card.selected { border-color:var(--accent); background:rgba(245,166,35,0.05); }
    .template-icon { font-size:28px; margin-bottom:8px; }
    .template-name { font-family:var(--font-head); font-size:14px; font-weight:600; margin-bottom:4px; }
    .template-desc { font-size:12px; color:var(--muted); line-height:1.4; }
    .composer { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:24px; margin-bottom:24px; }
    .composer-title { font-family:var(--font-head); font-size:16px; font-weight:600; margin-bottom:18px; }
    .recipient-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:8px; max-height:240px; overflow-y:auto; padding:12px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm); margin-bottom:16px; }
    .recipient-item { display:flex; align-items:center; gap:8px; padding:8px 10px; background:var(--card); border:1px solid var(--border); border-radius:var(--radius-sm); cursor:pointer; font-size:13px; transition:all var(--transition); }
    .recipient-item:hover { border-color:var(--accent); }
    .recipient-item input[type="checkbox"] { accent-color:var(--accent); }
    .preview-box { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
    .preview-header { background:var(--surface); padding:14px 20px; border-bottom:1px solid var(--border); font-family:var(--font-head); font-size:14px; font-weight:600; display:flex; justify-content:space-between; align-items:center; }
    .preview-body { padding:20px; }
    .wa-mock { background:#111b21; border-radius:12px; padding:16px; max-width:360px; }
    .wa-bubble { background:#005c4b; border-radius:8px 8px 0 8px; padding:12px 14px; font-size:13px; line-height:1.6; color:#e9edef; white-space:pre-wrap; }
    .wa-time { font-size:11px; color:#8696a0; text-align:right; margin-top:4px; }
    .log-item { display:flex; align-items:center; gap:14px; padding:14px 20px; border-bottom:1px solid var(--border); }
    .log-item:last-child { border-bottom:none; }
    .log-icon { font-size:20px; flex-shrink:0; }
    .log-body { flex:1; }
    .log-title { font-size:13px; font-weight:500; }
    .log-meta  { font-size:11px; color:var(--muted); margin-top:2px; }
    .log-status { flex-shrink:0; }
  </style>
</head>
<body>
  <div class="layout" id="layout"></div>
  <div id="toast-container" class="toast-container"></div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/pages/notifications.js"></script>
  <script>initNotifications();</script>
</body>
</html>
