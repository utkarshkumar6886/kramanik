<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kramanik — Batches</title>
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>
  <div class="layout" id="layout"></div>
  <div id="toast-container" class="toast-container"></div>

  <!-- Add / Edit Batch Modal -->
  <div class="modal-overlay" id="batch-modal">
    <div class="modal">
      <div class="modal-title" id="batch-modal-title">Add Batch</div>
      <input type="hidden" id="batch-id" />
      <div class="grid-2">
        <div class="form-group col-span-2"><label>Batch Name *</label><input id="b-name" placeholder="e.g. Class 10 Science Morning" /></div>
        <div class="form-group col-span-2"><label>Subject</label><input id="b-subject" placeholder="e.g. Physics, Chemistry, Maths" /></div>
        <div class="form-group"><label>Start Time</label><input id="b-start" type="time" /></div>
        <div class="form-group"><label>End Time</label><input id="b-end" type="time" /></div>
        <div class="form-group col-span-2"><label>Monthly Fee (₹) *</label><input id="b-fee" type="number" placeholder="1500" min="0" /></div>
      </div>
      <div class="form-group">
        <label>Schedule Days</label>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;" id="days-picker">
          <label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-size:13px;color:var(--text)"><input type="checkbox" value="MON"> Mon</label>
          <label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-size:13px;color:var(--text)"><input type="checkbox" value="TUE"> Tue</label>
          <label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-size:13px;color:var(--text)"><input type="checkbox" value="WED"> Wed</label>
          <label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-size:13px;color:var(--text)"><input type="checkbox" value="THU"> Thu</label>
          <label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-size:13px;color:var(--text)"><input type="checkbox" value="FRI"> Fri</label>
          <label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-size:13px;color:var(--text)"><input type="checkbox" value="SAT"> Sat</label>
          <label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-size:13px;color:var(--text)"><input type="checkbox" value="SUN"> Sun</label>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal('batch-modal')">Cancel</button>
        <button class="btn btn-primary" onclick="saveBatch()">Save Batch</button>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/pages/batches.js"></script>
  <script>initBatches();</script>
</body>
</html>
