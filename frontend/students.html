<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kramanik — Students</title>
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>
  <div class="layout" id="layout"></div>
  <div id="toast-container" class="toast-container"></div>

  <!-- Add / Edit Student Modal -->
  <div class="modal-overlay" id="student-modal">
    <div class="modal">
      <div class="modal-title" id="student-modal-title">Add Student</div>
      <input type="hidden" id="student-id" />
      <div class="grid-2">
        <div class="form-group"><label>Full Name *</label><input id="s-name" placeholder="e.g. Rahul Sharma" /></div>
        <div class="form-group"><label>Phone</label><input id="s-phone" placeholder="9876543210" /></div>
        <div class="form-group"><label>Parent Name</label><input id="s-parent-name" placeholder="Parent's name" /></div>
        <div class="form-group"><label>Parent Phone</label><input id="s-parent-phone" placeholder="9876543210" /></div>
        <div class="form-group"><label>WhatsApp (Parent)</label><input id="s-whatsapp" placeholder="9876543210" /></div>
        <div class="form-group"><label>Email</label><input id="s-email" type="email" placeholder="student@email.com" /></div>
        <div class="form-group"><label>Date of Birth</label><input id="s-dob" type="date" /></div>
        <div class="form-group"><label>Join Date *</label><input id="s-join" type="date" /></div>
        <div class="form-group col-span-2"><label>Address</label><textarea id="s-address" placeholder="Full address..."></textarea></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal('student-modal')">Cancel</button>
        <button class="btn btn-primary" onclick="saveStudent()">Save Student</button>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/pages/students.js"></script>
  <script>initStudents();</script>
</body>
</html>

<!-- Enrollment Modal -->
<div class="modal-overlay" id="enroll-modal">
  <div class="modal">
    <div class="modal-title">Batch Enrollments — <span id="enroll-student-name"></span></div>
    <p style="font-size:13px;color:var(--muted);margin-bottom:16px;">Enroll or remove this student from batches.</p>
    <div id="enroll-batch-list"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('enroll-modal')">Close</button>
    </div>
  </div>
</div>
